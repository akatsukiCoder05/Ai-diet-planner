<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🥗 AI Diet Planner - Organic Wellness</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..300,0..1&display=swap" rel="stylesheet" />
    
    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#4cd7f6",
              "primary-container": "#06b6d4",
              "background": "#0b1326",
              "surface": "#121a2e",
              "surface-container": "#171f33",
              "surface-container-low": "#131b2e",
              "on-surface": "#dae2fd",
              "on-surface-variant": "#aeb9d4",
              "outline": "#3d494c",
              "secondary": "#adc6ff",
              "tertiary": "#d0bcff",
              "error": "#ffb4ab"
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "1rem",
              "2xl": "1.5rem",
              "3xl": "2rem",
              "full": "9999px"
            },
            spacing: {
              "xs": "8px",
              "md": "24px",
              "lg": "40px",
              "xl": "64px",
              "margin-desktop": "48px",
              "margin-mobile": "16px"
            },
            fontFamily: {
              "serif": ["DM Serif Display", "serif"],
              "sans": ["Inter", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"]
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
